name: Bug Report
description: Report a reproducible problem in Purifyt
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail so the issue can be reproduced.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Describe the problem clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the exact steps that trigger the issue.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Desktop app
        - Backend server
        - Auto delete
        - Dataset management
        - Prediction/labeling
        - Explorer
        - Authentication
        - Release/installer
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Purifyt version or release tag.
      placeholder: v1.0.0

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: Windows 11 23H2

  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Paste relevant logs, terminal output, screenshots, or error messages. Remove secrets before posting.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have removed API keys, passwords, cookies, tokens, and personal data from this report.
          required: true
        - label: I searched existing issues before opening this report.
          required: true
