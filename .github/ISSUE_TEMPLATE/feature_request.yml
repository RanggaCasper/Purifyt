name: Feature Request
description: Suggest an improvement or new capability for Purifyt
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Describe the user problem first, then the solution you want.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: I want to ... because ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What should Purifyt do?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Desktop app
        - Backend server
        - Auto delete
        - Dataset management
        - Prediction/labeling
        - Explorer
        - Authentication
        - Release/installer
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workaround or other approach you considered?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add screenshots, examples, links, or notes that help explain the request.
