version: "3.9"

services:
  purifyt_app:
    image: ${GHCR_IMAGE:-ghcr.io/ranggacasper/purifyt:latest}
    container_name: purifyt_app
    restart: unless-stopped
    # Port tidak di-expose langsung — hanya diakses via nginx
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./cookies:/app/cookies
      - ./model:/app/model
      - ./logs:/app/logs
    networks:
      - purifyt_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:1.27-alpine
    container_name: purifyt_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      purifyt_app:
        condition: service_healthy
    networks:
      - purifyt_network

networks:
  purifyt_network:
    driver: bridge
